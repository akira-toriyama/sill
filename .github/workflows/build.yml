name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # macos-26: the package floor is macOS 26 — `swift test` executes the
    # built binaries, and a macos-15 host cannot load minos-26 images.
    runs-on: macos-26
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # Shared Swift build (setup-xcode + SPM cache + build + test). sill is
      # LIBRARY-ONLY (no .app) so — unlike facet — there is no ./package.sh
      # step. XCTest also runs LOCALLY now via `scripts/test.sh` (an installed
      # Xcode over the CLT-default shell); CI is the canonical required gate.
      - uses: akira-toriyama/.github/actions/swift-build@main
