# prism — the sill theme preview app.
# Read from ./prism.toml (or $PRISM_CONFIG). Edit + re-run `swift run prism`.
# This is the ONE config.toml in sill; the library modules stay config-less.

# Which themes to show. "all" = the full gallery, or a single canonical
# name — e.g. terminal · neon-noir · synthwave · ghostwire · cyberpunk ·
# tron · dracula · github-light · system (the full list is
# `Palette.canonicalThemeNames`). Unknown names fall back to terminal.
theme = "all"

# Specimen text scale (1.0 = default).
font-scale = 1.0

# Show the effect flash-palette strip for animatable themes (chomp/rainbow…).
show-effects = true
